apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: juice-shop-network-policy
  namespace: juice-shop
  labels:
    app: juice-shop
spec:
  podSelector:
    matchLabels:
      app: juice-shop
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from any source — required for MetalLB LoadBalancer and NodePort.
    # External traffic arrives at pods with the node IP as source (not a pod IP),
    # so namespaceSelector alone is not enough; ipBlock must cover 0.0.0.0/0.
    - from:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 3000
  egress:
    # Allow DNS resolution (Calico allows kube-dns traffic)
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    # Allow HTTP/HTTPS outbound
    - to: []
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 443
